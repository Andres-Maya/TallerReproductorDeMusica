name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Cambia a 'master' si tu rama principal se llama así
  workflow_dispatch:  # Permite ejecutar manualmente desde GitHub

# Permisos necesarios para desplegar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Instalar dependencias
        run: npm ci
      
      - name: Build frontend
        run: npm run build:frontend
        env:
          # IMPORTANTE: Cambia esta URL por la URL de tu backend desplegado
          # Por ejemplo, si usas Render, Heroku, Railway, etc.
          VITE_API_URL: https://tu-backend.onrender.com
      
      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4
      
      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/frontend'
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
