<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Waveline — Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
/* ─── Design Tokens ─────────────────────────────────────────── */
:root {
  --bg:          #F5F2EC;
  --surface:     #FEFCF8;
  --surface-alt: #F0EDE6;
  --border:      #E2DDD5;
  --accent:      #1A1A1A;
  --accent2:     #C8633A;
  --muted:       #8A857D;
  --text:        #1A1A1A;
  --text-light:  #5C5852;
  --active-bg:   #1A1A1A;
  --active-text: #FEFCF8;
  --radius-sm:   6px;
  --radius-md:   12px;
  --radius-lg:   20px;
  --shadow-soft: 0 2px 12px rgba(0,0,0,0.07);
  --shadow-card: 0 4px 24px rgba(0,0,0,0.10);
  --ff-display:  'DM Serif Display', Georgia, serif;
  --ff-body:     'DM Sans', sans-serif;
  --ff-mono:     'DM Mono', monospace;
  --transition:  0.22s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─── Reset & Base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; }
body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2rem 1rem 4rem;
}

/* ─── Layout ────────────────────────────────────────────────── */
.app-shell {
  width: 100%;
  max-width: 860px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto;
  gap: 1.25rem;
}

/* ─── Header ────────────────────────────────────────────────── */
.app-header {
  grid-column: 1 / -1;
  display: flex;
  align-items: baseline;
  gap: 1rem;
  padding: 0 0.25rem 0.5rem;
  border-bottom: 1.5px solid var(--border);
}
.app-logo {
  font-family: var(--ff-display);
  font-size: 2.2rem;
  color: var(--text);
  letter-spacing: -0.02em;
}
.app-logo span { color: var(--accent2); font-style: italic; }
.app-subtitle {
  font-size: 0.8rem;
  color: var(--muted);
  font-family: var(--ff-mono);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ─── Now Playing Card ──────────────────────────────────────── */
.now-playing {
  grid-column: 1 / -1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.75rem 2rem;
  box-shadow: var(--shadow-card);
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}
.np-top {
  display: flex;
  align-items: center;
  gap: 1.5rem;
}
.album-art {
  width: 72px;
  height: 72px;
  border-radius: var(--radius-md);
  background: var(--surface-alt);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
  transition: var(--transition);
}
.album-art svg { opacity: 0.4; transition: var(--transition); }
.album-art.playing svg { opacity: 0.15; }
.vinyl {
  width: 72px; height: 72px;
  border-radius: 50%;
  background: conic-gradient(#222 0deg, #333 40deg, #222 80deg, #333 120deg, #222 160deg, #333 200deg, #222 240deg, #333 280deg, #222 320deg, #333 360deg);
  display: none;
  align-items: center;
  justify-content: center;
  animation: spin 3s linear infinite;
  animation-play-state: paused;
}
.vinyl.visible { display: flex; }
.vinyl.spinning { animation-play-state: running; }
.vinyl::after {
  content: '';
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--surface);
  border: 3px solid #444;
}
@keyframes spin { to { transform: rotate(360deg); } }

.np-info { flex: 1; min-width: 0; }
.np-label {
  font-size: 0.68rem;
  font-family: var(--ff-mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent2);
  margin-bottom: 0.3rem;
}
.np-title {
  font-family: var(--ff-display);
  font-size: 1.55rem;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.np-artist {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 0.25rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.np-empty { color: var(--muted); font-size: 0.85rem; }

/* ─── Progress bar ──────────────────────────────────────────── */
.progress-wrap {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.progress-time {
  font-size: 0.72rem;
  font-family: var(--ff-mono);
  color: var(--muted);
  min-width: 2.6rem;
}
.progress-track {
  flex: 1;
  height: 4px;
  background: var(--surface-alt);
  border-radius: 99px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  width: 0%;
  transition: width 0.1s linear;
}
.progress-track:hover .progress-fill { background: var(--accent2); }

/* ─── Controls ──────────────────────────────────────────────── */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.75rem;
}
.ctrl-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text);
  transition: var(--transition);
  flex-shrink: 0;
}
.ctrl-btn:hover {
  background: var(--surface-alt);
  border-color: var(--accent);
  transform: scale(1.06);
}
.ctrl-btn:active { transform: scale(0.95); }
.ctrl-btn.sm { width: 36px; height: 36px; }
.ctrl-btn.lg {
  width: 52px; height: 52px;
  background: var(--accent);
  border-color: var(--accent);
  color: var(--surface);
}
.ctrl-btn.lg:hover {
  background: var(--accent2);
  border-color: var(--accent2);
  color: #fff;
}
.ctrl-btn svg { pointer-events: none; }

/* ─── Playlist Panel ────────────────────────────────────────── */
.playlist-panel {
  grid-column: 1 / -1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  overflow: hidden;
}
.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface-alt);
}
.panel-title {
  font-size: 0.72rem;
  font-family: var(--ff-mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.count-badge {
  font-size: 0.7rem;
  font-family: var(--ff-mono);
  padding: 2px 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 99px;
  color: var(--muted);
}

/* ─── Song List ─────────────────────────────────────────────── */
.song-list {
  max-height: 320px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.song-list::-webkit-scrollbar { width: 4px; }
.song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
.song-item {
  display: grid;
  grid-template-columns: 2.2rem 1fr auto;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1.5rem;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
  animation: fadeSlideIn 0.28s ease both;
}
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.song-item:last-child { border-bottom: none; }
.song-item:hover { background: var(--surface-alt); }
.song-item.active {
  background: var(--active-bg);
  color: var(--active-text);
}
.song-item.active .song-artist,
.song-item.active .song-pos { color: rgba(255,255,255,0.5); }

.song-pos {
  font-size: 0.7rem;
  font-family: var(--ff-mono);
  color: var(--muted);
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
}
.song-pos .eq-anim {
  display: none;
  gap: 2px;
  align-items: flex-end;
  height: 14px;
}
.song-pos .eq-anim span {
  width: 3px;
  border-radius: 1px;
  background: var(--accent2);
  animation: eq 0.7s ease-in-out infinite alternate;
}
.song-pos .eq-anim span:nth-child(2) { animation-delay: 0.15s; animation-duration: 0.9s; }
.song-pos .eq-anim span:nth-child(3) { animation-delay: 0.3s; animation-duration: 0.6s; }
@keyframes eq {
  from { height: 4px; }
  to   { height: 14px; }
}
.song-item.active .eq-anim { display: flex; }
.song-item.active .pos-num { display: none; }

.song-info { min-width: 0; }
.song-title {
  font-size: 0.88rem;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.song-artist {
  font-size: 0.75rem;
  color: var(--text-light);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 1px;
}
.song-actions { display: flex; align-items: center; gap: 6px; }
.del-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 4px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  transition: var(--transition);
  opacity: 0;
}
.song-item:hover .del-btn,
.song-item.active .del-btn { opacity: 1; }
.del-btn:hover { color: #c0392b; background: rgba(192,57,43,0.1); }
.song-item.active .del-btn { color: rgba(255,255,255,0.6); }
.song-item.active .del-btn:hover { color: #ff6b6b; background: rgba(255,255,255,0.12); }

.empty-state {
  padding: 3rem 1.5rem;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
}
.empty-state svg { opacity: 0.25; }

/* ─── Add Song Form ─────────────────────────────────────────── */
.add-panel {
  grid-column: 1 / -1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  overflow: hidden;
}
.add-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.1rem 1.5rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface-alt);
  cursor: pointer;
  user-select: none;
}
.add-header:hover { background: var(--bg); }
.add-header-left { display: flex; align-items: center; gap: 0.6rem; }
.add-form-title {
  font-size: 0.72rem;
  font-family: var(--ff-mono);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}
.toggle-chevron {
  color: var(--muted);
  transition: transform var(--transition);
}
.toggle-chevron.open { transform: rotate(180deg); }

.form-body {
  padding: 1.25rem 1.5rem;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem 1rem;
  overflow: hidden;
  max-height: 500px;
  transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s;
}
.form-body.collapsed { max-height: 0; padding-top: 0; padding-bottom: 0; }

.field { display: flex; flex-direction: column; gap: 0.3rem; }
.field.full { grid-column: 1 / -1; }
.field label {
  font-size: 0.7rem;
  font-family: var(--ff-mono);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
}
.field input, .field select {
  width: 100%;
  padding: 0.55rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-family: var(--ff-body);
  font-size: 0.875rem;
  outline: none;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.field input:focus, .field select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(26,26,26,0.07);
}
.field input::placeholder { color: var(--muted); }
.field select option { background: var(--surface); }

.form-actions {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;
  padding-top: 0.5rem;
}
.demo-btn {
  font-size: 0.75rem;
  font-family: var(--ff-mono);
  color: var(--muted);
  background: none;
  border: 1px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 0.45rem 0.85rem;
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.04em;
}
.demo-btn:hover { border-color: var(--accent); color: var(--text); background: var(--bg); }
.add-btn {
  font-family: var(--ff-body);
  font-size: 0.85rem;
  font-weight: 500;
  padding: 0.55rem 1.4rem;
  background: var(--accent);
  color: var(--surface);
  border: 1px solid var(--accent);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
  letter-spacing: 0.01em;
}
.add-btn:hover { background: var(--accent2); border-color: var(--accent2); }
.add-btn:active { transform: scale(0.97); }

/* ─── Toast ─────────────────────────────────────────────────── */
.toast-container {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  z-index: 999;
  pointer-events: none;
}
.toast {
  font-size: 0.8rem;
  font-family: var(--ff-mono);
  padding: 0.6rem 1.2rem;
  background: var(--accent);
  color: var(--surface);
  border-radius: 99px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  animation: toastIn 0.25s ease both;
  letter-spacing: 0.02em;
}
.toast.out { animation: toastOut 0.25s ease both; }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(12px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-8px); }
}

/* ─── Responsive ────────────────────────────────────────────── */
@media (max-width: 600px) {
  .app-shell { grid-template-columns: 1fr; }
  .now-playing { padding: 1.25rem; }
  .form-body { grid-template-columns: 1fr; }
  .form-body .field.full { grid-column: 1; }
}
</style>
</head>
<body>

<div class="app-shell" id="app">

  <!-- Header -->
  <header class="app-header">
    <h1 class="app-logo">Wave<span>line</span></h1>
    <p class="app-subtitle">Music Player</p>
  </header>

  <!-- Now Playing -->
  <section class="now-playing" aria-label="Now playing">
    <div class="np-top">
      <div class="album-art" id="albumArt">
        <!-- Static icon (hidden when vinyl visible) -->
        <svg id="musicIconStatic" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 18V5l12-2v13"/>
          <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <!-- Vinyl record -->
        <div class="vinyl" id="vinylDisc"></div>
      </div>
      <div class="np-info">
        <p class="np-label">Now playing</p>
        <p class="np-title" id="npTitle"><span class="np-empty">No song selected</span></p>
        <p class="np-artist" id="npArtist"></p>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
      <span class="progress-time" id="timeElapsed">0:00</span>
      <div class="progress-track" id="progressTrack" role="slider" aria-label="Seek">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="progress-time" id="timeDuration">0:00</span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn sm" id="btnPrev" aria-label="Previous song" title="Previous">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn lg" id="btnPlay" aria-label="Play/Pause">
        <svg id="iconPlay" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" style="display:none" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button class="ctrl-btn sm" id="btnNext" aria-label="Next song" title="Next">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 3.9V8.1L8.5 12zM16 6h2v12h-2z"/></svg>
      </button>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>
  </section>

  <!-- Playlist -->
  <section class="playlist-panel" aria-label="Playlist">
    <div class="panel-header">
      <span class="panel-title">Playlist</span>
      <span class="count-badge" id="countBadge">0 songs</span>
    </div>
    <div class="song-list" id="songList" role="list">
      <div class="empty-state" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <p>Your playlist is empty.<br/>Add a song below to get started.</p>
      </div>
    </div>
  </section>

  <!-- Add Song Form -->
  <section class="add-panel">
    <div class="add-header" id="addToggle" role="button" aria-expanded="true" tabindex="0">
      <div class="add-header-left">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/>
        </svg>
        <span class="add-form-title">Add song</span>
      </div>
      <svg class="toggle-chevron open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 15l-6-6-6 6"/>
      </svg>
    </div>

    <div class="form-body" id="formBody">
      <div class="field">
        <label for="inpTitle">Title</label>
        <input id="inpTitle" type="text" placeholder="Song title" autocomplete="off" />
      </div>
      <div class="field">
        <label for="inpArtist">Artist</label>
        <input id="inpArtist" type="text" placeholder="Artist name" autocomplete="off" />
      </div>
      <div class="field full">
        <label for="inpUrl">Audio URL</label>
        <input id="inpUrl" type="url" placeholder="https://example.com/song.mp3" autocomplete="off" />
      </div>
      <div class="field">
        <label for="inpPosition">Insert position</label>
        <select id="inpPosition">
          <option value="end">End of playlist</option>
          <option value="start">Start of playlist</option>
          <option value="index">Specific position…</option>
        </select>
      </div>
      <div class="field" id="indexFieldWrap" style="display:none">
        <label for="inpIndex">Position (1-based)</label>
        <input id="inpIndex" type="number" min="1" placeholder="e.g. 2" />
      </div>
      <div class="form-actions">
        <button class="demo-btn" id="demoBtn">+ Load demo songs</button>
        <button class="add-btn" id="addBtn">Add to playlist</button>
      </div>
    </div>
  </section>

</div>

<!-- Toast container -->
<div class="toast-container" id="toastContainer" aria-live="polite"></div>

<!-- ─── Application Logic (TypeScript compiled to ES2020) ─────── -->
<script>
"use strict";

// ════════════════════════════════════════════════════════════
//  Domain: Song entity
// ════════════════════════════════════════════════════════════
class Song {
  id;
  title;
  artist;
  audioUrl;

  constructor(title, artist, audioUrl) {
    this.id = `song-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`;
    this.title = title.trim();
    this.artist = artist.trim();
    this.audioUrl = audioUrl.trim();
  }

  get displayLabel() {
    return `${this.title} — ${this.artist}`;
  }

  isValid() {
    return this.title.length > 0 && this.artist.length > 0 && this.audioUrl.length > 0;
  }
}

// ════════════════════════════════════════════════════════════
//  Data Structure: TrackNode (Doubly Linked List node)
// ════════════════════════════════════════════════════════════
class TrackNode {
  song;
  prev = null;
  next = null;

  constructor(song) {
    this.song = song;
  }
}

// ════════════════════════════════════════════════════════════
//  Data Structure: TrackList (Doubly Linked List)
//  Manages ordered collection of TrackNode instances.
// ════════════════════════════════════════════════════════════
class TrackList {
  #head = null;
  #tail = null;
  #size = 0;

  get size() { return this.#size; }
  get head() { return this.#head; }
  get tail() { return this.#tail; }

  /** Append a song at the end of the list. O(1) */
  addToEnd(song) {
    const node = new TrackNode(song);
    if (!this.#tail) {
      this.#head = this.#tail = node;
    } else {
      node.prev = this.#tail;
      this.#tail.next = node;
      this.#tail = node;
    }
    this.#size++;
    return node;
  }

  /** Prepend a song at the beginning. O(1) */
  addToStart(song) {
    const node = new TrackNode(song);
    if (!this.#head) {
      this.#head = this.#tail = node;
    } else {
      node.next = this.#head;
      this.#head.prev = node;
      this.#head = node;
    }
    this.#size++;
    return node;
  }

  /**
   * Insert at 1-based index position.
   * Clamps to valid range [1, size+1].  O(n)
   */
  addAtIndex(song, index) {
    const clamped = Math.max(1, Math.min(index, this.#size + 1));
    if (clamped === 1) return this.addToStart(song);
    if (clamped === this.#size + 1) return this.addToEnd(song);

    const node = new TrackNode(song);
    let cursor = this.#head;
    for (let i = 1; i < clamped - 1; i++) cursor = cursor.next;

    node.next = cursor.next;
    node.prev = cursor;
    if (cursor.next) cursor.next.prev = node;
    cursor.next = node;
    this.#size++;
    return node;
  }

  /** Remove a node by reference. O(1) */
  remove(node) {
    if (node.prev) node.prev.next = node.next;
    else this.#head = node.next;

    if (node.next) node.next.prev = node.prev;
    else this.#tail = node.prev;

    node.prev = node.next = null;
    this.#size--;
  }

  /** Find a node by song id. O(n) */
  findById(id) {
    let cursor = this.#head;
    while (cursor) {
      if (cursor.song.id === id) return cursor;
      cursor = cursor.next;
    }
    return null;
  }

  /** Convert to array for rendering. O(n) */
  toArray() {
    const arr = [];
    let cursor = this.#head;
    while (cursor) { arr.push(cursor); cursor = cursor.next; }
    return arr;
  }

  clear() {
    this.#head = this.#tail = null;
    this.#size = 0;
  }
}

// ════════════════════════════════════════════════════════════
//  Domain: PlaylistManager
//  Encapsulates all playlist and playback state.
// ════════════════════════════════════════════════════════════
class PlaylistManager {
  #list = new TrackList();
  #currentNode = null;
  #isPlaying = false;

  get isPlaying() { return this.#isPlaying; }
  get currentSong() { return this.#currentNode?.song ?? null; }
  get currentNode() { return this.#currentNode; }
  get size() { return this.#list.size; }
  get tracks() { return this.#list.toArray(); }

  addToEnd(song)           { return this.#list.addToEnd(song); }
  addToStart(song)         { return this.#list.addToStart(song); }
  addAtIndex(song, index)  { return this.#list.addAtIndex(song, index); }

  remove(songId) {
    const node = this.#list.findById(songId);
    if (!node) return false;
    if (this.#currentNode === node) {
      // Move current pointer before removal
      this.#currentNode = node.next ?? node.prev ?? null;
      this.#isPlaying = false;
    }
    this.#list.remove(node);
    return true;
  }

  /** Select a specific node to play. */
  play(songId) {
    const node = this.#list.findById(songId);
    if (!node) return null;
    this.#currentNode = node;
    this.#isPlaying = true;
    return node.song;
  }

  togglePause() {
    if (!this.#currentNode) return false;
    this.#isPlaying = !this.#isPlaying;
    return this.#isPlaying;
  }

  /** Advance to next track. Wraps around. */
  next() {
    if (!this.#list.head) return null;
    if (!this.#currentNode) {
      this.#currentNode = this.#list.head;
    } else {
      this.#currentNode = this.#currentNode.next ?? this.#list.head;
    }
    this.#isPlaying = true;
    return this.#currentNode.song;
  }

  /** Step back to previous track. Wraps around. */
  previous() {
    if (!this.#list.head) return null;
    if (!this.#currentNode) {
      this.#currentNode = this.#list.tail;
    } else {
      this.#currentNode = this.#currentNode.prev ?? this.#list.tail;
    }
    this.#isPlaying = true;
    return this.#currentNode.song;
  }

  clear() {
    this.#list.clear();
    this.#currentNode = null;
    this.#isPlaying = false;
  }
}

// ════════════════════════════════════════════════════════════
//  UI Controller — bridges PlaylistManager ↔ DOM
// ════════════════════════════════════════════════════════════
const manager = new PlaylistManager();
const audio = document.getElementById('audioPlayer');

// DOM refs
const songList     = document.getElementById('songList');
const emptyState   = document.getElementById('emptyState');
const countBadge   = document.getElementById('countBadge');
const npTitle      = document.getElementById('npTitle');
const npArtist     = document.getElementById('npArtist');
const progressFill = document.getElementById('progressFill');
const progressTrack= document.getElementById('progressTrack');
const timeElapsed  = document.getElementById('timeElapsed');
const timeDuration = document.getElementById('timeDuration');
const btnPlay      = document.getElementById('btnPlay');
const iconPlay     = document.getElementById('iconPlay');
const iconPause    = document.getElementById('iconPause');
const vinylDisc    = document.getElementById('vinylDisc');
const musicIcon    = document.getElementById('musicIconStatic');
const albumArt     = document.getElementById('albumArt');
const inpTitle     = document.getElementById('inpTitle');
const inpArtist    = document.getElementById('inpArtist');
const inpUrl       = document.getElementById('inpUrl');
const inpPosition  = document.getElementById('inpPosition');
const inpIndex     = document.getElementById('inpIndex');
const indexWrap    = document.getElementById('indexFieldWrap');
const addBtn       = document.getElementById('addBtn');
const demoBtn      = document.getElementById('demoBtn');
const addToggle    = document.getElementById('addToggle');
const formBody     = document.getElementById('formBody');
const chevron      = addToggle.querySelector('.toggle-chevron');

// ─── Toast utility ───────────────────────────────────────────
function showToast(msg, duration = 2500) {
  const tc = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => {
    t.classList.add('out');
    t.addEventListener('animationend', () => t.remove(), { once: true });
  }, duration);
}

// ─── Format seconds → M:SS ──────────────────────────────────
function fmt(secs) {
  if (!isFinite(secs)) return '0:00';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

// ─── Render playlist ─────────────────────────────────────────
function renderPlaylist() {
  const tracks = manager.tracks;
  countBadge.textContent = `${tracks.length} ${tracks.length === 1 ? 'song' : 'songs'}`;

  // Remove existing items (keep emptyState node)
  Array.from(songList.querySelectorAll('.song-item')).forEach(el => el.remove());

  if (tracks.length === 0) {
    emptyState.style.display = '';
    return;
  }
  emptyState.style.display = 'none';

  tracks.forEach((node, idx) => {
    const song = node.song;
    const isActive = manager.currentNode === node;

    const item = document.createElement('div');
    item.className = `song-item${isActive ? ' active' : ''}`;
    item.dataset.id = song.id;
    item.setAttribute('role', 'listitem');
    item.innerHTML = `
      <div class="song-pos">
        <span class="pos-num">${idx + 1}</span>
        <div class="eq-anim" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
      <div class="song-info">
        <p class="song-title">${escHtml(song.title)}</p>
        <p class="song-artist">${escHtml(song.artist)}</p>
      </div>
      <div class="song-actions">
        <button class="del-btn" data-id="${song.id}" aria-label="Remove ${escHtml(song.title)}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/>
          </svg>
        </button>
      </div>`;

    item.addEventListener('click', (e) => {
      if (e.target.closest('.del-btn')) return;
      loadAndPlay(song.id);
    });

    item.querySelector('.del-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteSong(song.id, song.title);
    });

    songList.appendChild(item);
  });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Update Now Playing UI ───────────────────────────────────
function updateNowPlayingUI() {
  const song = manager.currentSong;
  if (!song) {
    npTitle.innerHTML = '<span class="np-empty">No song selected</span>';
    npArtist.textContent = '';
    vinylDisc.classList.remove('visible', 'spinning');
    musicIcon.style.display = '';
    return;
  }
  npTitle.textContent = song.title;
  npArtist.textContent = song.artist;
  vinylDisc.classList.add('visible');
  musicIcon.style.display = 'none';
}

// ─── Update play/pause button state ─────────────────────────
function updatePlayBtn(playing) {
  iconPlay.style.display  = playing ? 'none' : '';
  iconPause.style.display = playing ? ''     : 'none';
  if (playing) {
    vinylDisc.classList.add('spinning');
  } else {
    vinylDisc.classList.remove('spinning');
  }
}

// ─── Load a song and start playback ─────────────────────────
function loadAndPlay(songId) {
  const song = manager.play(songId);
  if (!song) return;
  audio.src = song.audioUrl;
  audio.play().catch(() => {
    // Browser autoplay policy — show a toast
    showToast('⚠ Could not auto-play. Click play manually.');
    manager.togglePause(); // revert playing state
    updatePlayBtn(false);
  });
  updateNowPlayingUI();
  updatePlayBtn(true);
  renderPlaylist();
}

// ─── Delete a song ───────────────────────────────────────────
function deleteSong(songId, title) {
  const wasCurrent = manager.currentSong?.id === songId;
  manager.remove(songId);

  if (wasCurrent) {
    audio.pause();
    audio.src = '';
    progressFill.style.width = '0%';
    timeElapsed.textContent = '0:00';
    timeDuration.textContent = '0:00';
    updateNowPlayingUI();
    updatePlayBtn(false);
    // Auto-play next if available
    if (manager.size > 0 && manager.currentNode) {
      setTimeout(() => loadAndPlay(manager.currentNode.song.id), 100);
    }
  }
  renderPlaylist();
  showToast(`Removed "${title}"`);
}

// ─── Audio events ────────────────────────────────────────────
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = `${pct}%`;
  timeElapsed.textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  timeDuration.textContent = fmt(audio.duration);
});
audio.addEventListener('ended', () => {
  // Auto-advance to next
  const next = manager.next();
  if (next) {
    audio.src = next.audioUrl;
    audio.play().catch(() => {});
    updateNowPlayingUI();
    updatePlayBtn(true);
    renderPlaylist();
  } else {
    updatePlayBtn(false);
  }
});

// ─── Seek on click ───────────────────────────────────────────
progressTrack.addEventListener('click', (e) => {
  if (!audio.duration) return;
  const rect = progressTrack.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  audio.currentTime = ratio * audio.duration;
});

// ─── Control buttons ─────────────────────────────────────────
btnPlay.addEventListener('click', () => {
  if (manager.size === 0) { showToast('Add songs first!'); return; }

  if (!manager.currentSong) {
    // Nothing selected — play first
    loadAndPlay(manager.tracks[0].song.id);
    return;
  }

  if (audio.paused) {
    audio.play().catch(() => {});
    manager.togglePause();
    updatePlayBtn(true);
  } else {
    audio.pause();
    manager.togglePause();
    updatePlayBtn(false);
  }
});

document.getElementById('btnPrev').addEventListener('click', () => {
  const song = manager.previous();
  if (!song) return;
  audio.src = song.audioUrl;
  audio.play().catch(() => {});
  updateNowPlayingUI();
  updatePlayBtn(true);
  renderPlaylist();
});

document.getElementById('btnNext').addEventListener('click', () => {
  const song = manager.next();
  if (!song) return;
  audio.src = song.audioUrl;
  audio.play().catch(() => {});
  updateNowPlayingUI();
  updatePlayBtn(true);
  renderPlaylist();
});

// ─── Form: toggle position input ─────────────────────────────
inpPosition.addEventListener('change', () => {
  indexWrap.style.display = inpPosition.value === 'index' ? '' : 'none';
});

// ─── Form: collapse/expand ───────────────────────────────────
addToggle.addEventListener('click', () => {
  const collapsed = formBody.classList.toggle('collapsed');
  chevron.classList.toggle('open', !collapsed);
  addToggle.setAttribute('aria-expanded', String(!collapsed));
});
addToggle.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); addToggle.click(); }
});

// ─── Add song ────────────────────────────────────────────────
addBtn.addEventListener('click', () => {
  const title  = inpTitle.value.trim();
  const artist = inpArtist.value.trim();
  const url    = inpUrl.value.trim();

  if (!title)  { showToast('Please enter a title.'); inpTitle.focus(); return; }
  if (!artist) { showToast('Please enter an artist.'); inpArtist.focus(); return; }
  if (!url)    { showToast('Please enter an audio URL.'); inpUrl.focus(); return; }

  const song = new Song(title, artist, url);
  const pos  = inpPosition.value;

  if (pos === 'start') {
    manager.addToStart(song);
  } else if (pos === 'index') {
    const idx = parseInt(inpIndex.value) || 1;
    manager.addAtIndex(song, idx);
  } else {
    manager.addToEnd(song);
  }

  renderPlaylist();
  showToast(`Added "${song.title}"`);

  // Reset form
  inpTitle.value = '';
  inpArtist.value = '';
  inpUrl.value = '';
  inpIndex.value = '';
  inpPosition.value = 'end';
  indexWrap.style.display = 'none';
  inpTitle.focus();
});

// Enter key on last field triggers add
inpUrl.addEventListener('keydown', (e) => { if (e.key === 'Enter') addBtn.click(); });

// ─── Demo songs (royalty-free from public archives) ──────────
const DEMO_SONGS = [
  {
    title: 'Jazz in Paris',
    artist: 'Media Right Productions',
    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
  },
  {

    artist: 'Benjamin Tissot',
    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
  },
  {
    title: 'Creative Minds',
    artist: 'Benjamin Tissot',
    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
  },
  {
    title: 'Tenderness',
    artist: 'Benjamin Tissot',
    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'
  },
];

demoBtn.addEventListener('click', () => {
  DEMO_SONGS.forEach(d => manager.addToEnd(new Song(d.title, d.artist, d.url)));
  renderPlaylist();
  showToast('Demo songs loaded!');
});

// ─── Keyboard shortcuts ──────────────────────────────────────
document.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;

  if (e.key === ' ')          { e.preventDefault(); btnPlay.click(); }
  if (e.key === 'ArrowRight') { e.preventDefault(); document.getElementById('btnNext').click(); }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); document.getElementById('btnPrev').click(); }
});

// ─── Init ────────────────────────────────────────────────────
renderPlaylist();
</script>
</body>
